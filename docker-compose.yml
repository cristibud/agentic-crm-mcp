# Production stack for Coolify.
# Coolify reads this file, builds each service and exposes the ones carrying a
# SERVICE_FQDN_* magic variable through its Traefik proxy (3 separate domains).
#
# The database is an EXTERNAL (managed) Postgres — set DATABASE_URL in the Coolify
# Environment Variables. Configure the rest from .env.production.example. The three
# NEXT_PUBLIC_* values must be the PUBLIC domains of api/mcp because they are baked
# into the browser bundle at build time.

services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      # Coolify generates/binds a public domain for this service on port 3001.
      - SERVICE_FQDN_API_3001
      - NODE_ENV=production
      - PORT=3001
      # External managed Postgres — full connection string set in Coolify env.
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      # Internal docker-network address of the mcp service (restart signalling).
      - MCP_SERVER_URL=http://mcp:3002
    expose:
      - "3001"
    networks:
      # default → talk to mcp/web; coolify → reach the managed Postgres by its
      # internal hostname.
      - default
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  mcp:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_MCP_3002
      - NODE_ENV=production
      - MCP_PORT=3002
      # Internal docker-network address of the api service.
      - API_URL=http://api:3001
      - API_KEY=${API_KEY}
    expose:
      - "3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        # PUBLIC urls — must be reachable from the user's browser.
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_MCP_URL=${NEXT_PUBLIC_MCP_URL}
        - NEXT_PUBLIC_MCP_SERVER_URL=${NEXT_PUBLIC_MCP_URL}
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_WEB_3000
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    depends_on:
      - api
      - mcp

networks:
  # Coolify's predefined network, where managed databases live. Declared as
  # external so the api can reach the managed Postgres by its internal hostname.
  coolify:
    external: true
