# Production stack for Coolify.
# Coolify reads this file, builds each service and exposes the ones carrying a
# SERVICE_FQDN_* magic variable through its Traefik proxy (3 separate domains).
#
# Configure the variables from .env.production.example in the Coolify UI
# (Environment Variables). The three NEXT_PUBLIC_* values must be the PUBLIC
# domains of api/mcp because they are baked into the browser bundle at build time.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    environment:
      # Coolify generates/binds a public domain for this service on port 3001.
      - SERVICE_FQDN_API_3001
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@postgres:5432/${POSTGRES_DB:-crm_db}
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      # Internal docker-network address of the mcp service (restart signalling).
      - MCP_SERVER_URL=http://mcp:3002
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  mcp:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_MCP_3002
      - NODE_ENV=production
      - MCP_PORT=3002
      # Internal docker-network address of the api service.
      - API_URL=http://api:3001
      - API_KEY=${API_KEY}
    expose:
      - "3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        # PUBLIC urls — must be reachable from the user's browser.
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_MCP_URL=${NEXT_PUBLIC_MCP_URL}
        - NEXT_PUBLIC_MCP_SERVER_URL=${NEXT_PUBLIC_MCP_URL}
    restart: unless-stopped
    environment:
      - SERVICE_FQDN_WEB_3000
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    expose:
      - "3000"
    depends_on:
      - api
      - mcp

volumes:
  postgres_data:
